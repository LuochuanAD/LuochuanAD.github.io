<!-- Navigation -->
<nav class="navbar navbar-default navbar-custom navbar-fixed-top">
    <div class="container-fluid">
        <!-- Brand and toggle get grouped for better mobile display -->
        <div class="navbar-header page-scroll" style="display: flex; gap: 10px;">
            <button type="button" class="navbar-toggle">
                <span class="sr-only">Toggle navigation</span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="{{ site.baseurl }}/">{{ site.title }}</a>

            <!-- 语言切换按钮 -->
            <div class="dropdown" id="lang-switcher">
                <button class="btn btn-light dropdown-toggle" type="button" id="dropdownLangBtn" data-bs-toggle="dropdown" aria-expanded="false">
                   <span id="current-lang"> 🌐 EN</span>
                </button>
                <ul class="dropdown-menu" aria-labelledby="dropdownLangBtn">
                    <li><a class="dropdown-item" href="#" data-lang="EN">English</a></li>
                    <li><a class="dropdown-item" href="#" data-lang="ZH">中文</a></li>
                    <li><a class="dropdown-item" href="#" data-lang="JA">日本語</a></li>
                </ul>
            </div>
        </div>

        <!-- Collect the nav links, forms, and other content for toggling -->
        <div id="huxblog_navbar">
            <div class="navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li>
                        <a href="{{ site.baseurl }}/">Home</a>
                    </li>
                    {% for page in site.pages %}{% if page.title %}
                    <li>
                        <a href="{{ page.url | prepend: site.baseurl }}">{{ page.title }}</a>
                    </li>
                    {% endif %}{% endfor %}
                </ul>
            </div>
        </div>
        <!-- /.navbar-collapse -->
    </div>
    <!-- /.container -->
</nav>
<script>
    // Drop Bootstarp low-performance Navbar
    // Use customize navbar with high-quality material design animation
    // in high-perf jank-free CSS3 implementation
    var $body   = document.body;
    var $toggle = document.querySelector('.navbar-toggle');
    var $navbar = document.querySelector('#huxblog_navbar');
    var $collapse = document.querySelector('.navbar-collapse');

    var __HuxNav__ = {
        close: function(){
            $navbar.className = " ";
            // wait until animation end.
            setTimeout(function(){
                // prevent frequently toggle
                if($navbar.className.indexOf('in') < 0) {
                    $collapse.style.height = "0px"
                }
            },400)
        },
        open: function(){
            $collapse.style.height = "auto"
            $navbar.className += " in";
        }
    }

    // Bind Event
    $toggle.addEventListener('click', function(e){
        if ($navbar.className.indexOf('in') > 0) {
            __HuxNav__.close()
        }else{
            __HuxNav__.open()
        }
    })

    /**
     * Since Fastclick is used to delegate 'touchstart' globally
     * to hack 300ms delay in iOS by performing a fake 'click',
     * Using 'e.stopPropagation' to stop 'touchstart' event from 
     * $toggle/$collapse will break global delegation.
     * 
     * Instead, we use a 'e.target' filter to prevent handler
     * added to document close HuxNav.  
     *
     * Also, we use 'click' instead of 'touchstart' as compromise
     */
    document.addEventListener('click', function(e){
        if(e.target == $toggle) return;
        if(e.target.className == 'icon-bar') return;
        __HuxNav__.close();
    })

    const path = window.location.pathname;

    let lang = " 🌐 EN";
    
    if(path.startsWith("/zh")){
    lang = " 🌐 中文";
    }
    else if(path.startsWith("/jp")){
    lang = " 🌐 JP";
    }
    else if(path.startsWith("/en")){
    lang = " 🌐 EN";
    }

    document.getElementById("current-lang").innerText = lang;


    const currentLang = document.getElementById('current-lang');

    document.querySelectorAll('#lang-switcher .dropdown-item').forEach(item => {
        item.addEventListener('click', (e) => {
            e.preventDefault();
            const selectedLang = item.getAttribute('data-lang');
            currentLang.textContent = selectedLang;

            // 假设你的目录结构 /en/ /zh/ /ja/
            const pathParts = window.location.pathname.split('/');
            pathParts[1] = selectedLang.toLowerCase();
            window.location.pathname = pathParts.join('/');
        });
    });
</script>
