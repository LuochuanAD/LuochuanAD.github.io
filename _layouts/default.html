<!DOCTYPE html>
<html lang="">

{% include head.html %}

<style>
* {
  box-sizing: border-box;
}

html {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

img {
  max-width: 100%;
  height: auto;
}

.lang-switch{
  position:absolute;
  top:20px;
  right:20px;
  font-size:14px;
}
</style>

<body ontouchstart="">
  
{% include nav.html %}

<div class="lang-switch">
  <a href="/zh/">中文</a> |
  <a href="/en/">EN</a> |
  <a href="/jp/">JP</a>
</div>

{{ content }}

{% include footer.html %}

<img src="/img/apple-touch-icon.png" width="0" height="0" />

<script>
(function() {

  var path = window.location.pathname;

  if (path.startsWith("/zh") || path.startsWith("/en") || path.startsWith("/jp")) {
      return;
  }

  var lang = navigator.language;

  if (lang.startsWith("zh")) {
      window.location.href = "/zh/";
  }
  else if (lang.startsWith("ja")) {
      window.location.href = "/jp/";
  }
  else {
      window.location.href = "/en/";
  }

})();
</script>

</body>
</html>
